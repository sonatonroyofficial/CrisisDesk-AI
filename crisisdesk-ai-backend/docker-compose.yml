version: '3.8'

services:
  mongo:
    image: mongo:6.0-jammy
    container_name: crisisdesk-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crisisdesk-api
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/crisisdesk
    depends_on:
      - mongo
    restart: unless-stopped

volumes:
  mongo-data:
    driver: local
